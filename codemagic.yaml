workflows:
  ios-unsigned-workflow:
    name: Build Unsigned iOS IPA
    instance_type: mac_mini_m2
    environment:
      flutter: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Unsigned App & Package to IPA
        script: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/Payload
          cp -r build/ios/Release-iphoneos/Runner.app build/ios/Payload/
          cd build/ios
          zip -r release.ipa Payload
    artifacts:
      - build/ios/release.ipa
